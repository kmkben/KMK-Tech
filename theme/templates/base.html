{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta http-equiv="X-UA-Compatible" content="ie=edge">

		<title>
			{% block title %}KMK-Tech{% endblock %}
		</title>

		{% tailwind_css %}

		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

		<script>
			document.addEventListener('DOMContentLoaded', () => {
			  const toggles = [
				document.getElementById('theme-toggle-mobile'),
				document.getElementById('theme-toggle-desktop')
			  ].filter(Boolean); // removes nulls if one is missing
		  
			  const iconSuns = document.querySelectorAll('.icon-sun');
			  const iconMoons = document.querySelectorAll('.icon-moon');
		  
			  const savedTheme = localStorage.getItem('theme');
			  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
			  const isDark = savedTheme === 'dark' || (!savedTheme && prefersDark);
		  
			  document.documentElement.classList.toggle('dark', isDark);
			  iconSuns.forEach(el => el.classList.toggle('hidden', !isDark));
			  iconMoons.forEach(el => el.classList.toggle('hidden', isDark));
		  
			  toggles.forEach(toggle => {
				toggle.addEventListener('click', () => {
				  const currentlyDark = document.documentElement.classList.toggle('dark');
				  localStorage.setItem('theme', currentlyDark ? 'dark' : 'light');
				  iconSuns.forEach(el => el.classList.toggle('hidden', !currentlyDark));
				  iconMoons.forEach(el => el.classList.toggle('hidden', currentlyDark));
				});
			  });
			});
		  </script>

		<style>
			.badge {
				@apply bg-gray-700 text-white px-3 py-1 rounded-full;
			}
		</style>
	</head>

	<body class="bg-gray-900 text-gray-900">
		<div class="flex min-h-screen">
			<!-- Sidebar -->
			{% include 'partials/_sidebar.html' %}
		
			<!-- Main content -->
			<div class="flex flex-col flex-1 min-h-screen lg:ml-64">
				{% include 'partials/_header.html' %}
		
				<main class="flex-grow p-6">
					{% block content %}{% endblock %}
				</main>
		
				{% include 'partials/_footer.html' %}
			</div>
		</div>
	</body>
</html>

<script>
	const toggleBtn = document.getElementById('toggleSidebar');
	const sidebar = document.getElementById('sidebar');
  
	if (toggleBtn && sidebar) {
	  toggleBtn.addEventListener('click', () => {
		sidebar.classList.toggle('hidden');
		sidebar.classList.toggle('absolute');
		sidebar.classList.toggle('z-50');
		sidebar.classList.toggle('top-0');
		sidebar.classList.toggle('left-0');
		sidebar.classList.toggle('h-full');
	  });
	}
  </script>
